<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="../static/css/style.css" />
		<link rel="stylesheet" href="../static/css/bootstrap.css" />
		<script src="../static/js/moment.min.js"></script>
		<script src="../static/js/jquery-3.5.1.min.js"></script>
		<script src="../static/js/socket.io.min.js"></script>
		<script  src="../static/js/global_view.js"> </script>
        <title>Postural Monitoring</title>
    </head>
    <body class="aio_global_box_0">
		<div class="hover_bkgr_fricc">
			<span class="helper"></span>
			<div>
				<div class="popupCloseButton">&times;</div>
				<p id="popuptText">Seat is EMPTY<br />can't start ASANA</p>
				<button class="btn btn-primary  btn-space d-none" id="btn-p1">Profile 1</button>
				<button class="btn btn-primary  btn-space d-none" id="btn-p2">Profile 2</button>
				<button class="btn btn-primary  btn-space d-none" id="btn-p3">Profile 3</button>
				<button class="btn btn-primary  btn-space d-none" id="btn-p4">Profile 4</button>
			</div>
		</div>

            <nav class="navbar-nav-scroll navbar-dark bg-dark">
                <ul class="navbar-nav mr-auto flex-row">
					<li class="nav-item active">
						<a class="navbar-brand nav-hmi" href="/">AIO Global View</a>
					</li>
                    <li class="nav-item active">
						<a class="navbar-brand nav-hmi" href="hmi">HMI</a>
					</li>
					<li class="nav-item active">
						<a class="nav-link" href="seat_status">OCS</a>
					</li>  
					<li class="nav-item active">
						<a href="#" class="nav-link nav-monitoring" >ASANA<span class="sr-only">(current)</span></a>
					</li>
					<li class="nav-item active">
						<a class="nav-link" href="chart">Charts</a>
					</li>						
				</ul>
            </nav>

            <div class="aio_global_box_1">
                <div class="col">

                    <div class="row justify-content-center position-relative">

                        <div class="panel">		
                            <div class="seat">
                                <div class="container text-center">
                                    <div class="status inactive"></div>
                                </div>
                                <div class="hover_bkgr_fricc">
                                    <span class="helper"></span>
                                    <div>
                                        <div class="popupCloseButton">&times;</div>
                                        <p>Seat is EMPTY<br />can't start ASANA</p>
                                    </div>
                                </div>
                            </div>
                            <div class="section-messages">
                                <h2 class="section-title status-message">Seat is Empty</h2>
                            </div>					
					    </div>
                        <div class="col-md-7">                  
                            <div class="row justify-content-center position-relative" style="margin-right: -30px;">
                                <canvas id="backSensorsChart" aria-label="Back Sensors Chart" role="img" style="margin-top: 20px;max-width: 900px;max-height: 450px;"></canvas>
                            </div>
        
                            <div class="row justify-content-center position-relative" style="margin-top: 10px; margin-right: -30px;">
                                <span class="label">Duration (in seconds):</span>
                                <span id="durationValue" class="value">10</span>
                                <span><input type="range" min="10" max="60" step="10" value="10" id="duration" class="control"></span>
                            </div>
        
                            <div class="row justify-content-center position-relative" style="margin-top: 10px; margin-right: -30px;">
                                <span class="label">Acquisitions (per seconds):</span>
                                <span id="acquisitionsValue" class="value">10</span>
                                <span><input type="range" min="1" max="10" step="9" value="10" id="acquisitions" class="control"></span>
                            </div>
        
                            <div class="row justify-content-center position-relative" style="margin-top: 5px; margin-right: -30px;">
                                <button type="button" class="btn btn-outline-secondary btn-chart-pause" style="margin: 5px;">Pause</button>
                                <button type="button" class="btn btn-outline-primary btn-chart-resume" style="display: none;margin: 5px;">Resume</button>
                                <button type="button" class="btn btn-outline-info btn-chart-clear" style="margin: 5px;">Clear</button>
                                <button type="button" class="btn btn-outline-dark btn-chart-resetZoom" style="display: none;margin: 5px;">Reset Zoom</button>
                            </div>
        
        
                            <div class="row justify-content-center position-relative" style="margin-right: -30px;">
                                <canvas id="cushionSensorsChart" aria-label="Cushion Sensors Chart" role="img" style="margin-top: 10px;max-width: 900px;max-height: 450px;"></canvas>
                            </div>
                        </div>
                        <div class="wrapper">
                        </div>
                    </div>
							
                </div>
                <div class="debug d-none">
                </div>
            </div>
    </body>
</html>
